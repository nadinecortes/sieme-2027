<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEME 2027 - Sistema Inteligente de Monitoreo Electoral</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --rojo: #dc2626;
            --naranja: #f97316;
            --amarillo: #eab308;
            --verde: #22c55e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        #loginScreen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .login-container {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 420px;
        }

        .login-container h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-container p {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-dark);
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        #app {
            display: none;
        }

        #app.show {
            display: block;
        }

        .header {
            background: var(--bg-card);
            padding: 1rem 2rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .live-badge {
            background: var(--danger);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .countdown {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .countdown strong {
            color: var(--accent);
            font-size: 1.1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .btn-logout {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid #334155;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-logout:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            transition: all 0.3s;
            cursor: pointer;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            border-color: var(--accent);
        }

        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .kpi-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-icon {
            width: 40px;
            height: 40px;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .kpi-change {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .kpi-change.positive {
            color: var(--success);
        }

        .kpi-change.negative {
            color: var(--danger);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .tab:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .section {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title i {
            color: var(--accent);
        }

        #map {
            height: 600px;
            border-radius: 0.5rem;
            border: 1px solid #334155;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 0.625rem;
            background: var(--bg-dark);
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .risk-filters {
            display: flex;
            gap: 0.75rem;
        }

        .risk-btn {
            padding: 0.625rem 1.25rem;
            border: 1px solid #334155;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .risk-btn:hover {
            background: var(--bg-hover);
        }

        .risk-btn.active {
            color: white;
            border-color: currentColor;
        }

        .risk-btn.rojo.active {
            background: var(--rojo);
            border-color: var(--rojo);
        }

        .risk-btn.naranja.active {
            background: var(--naranja);
            border-color: var(--naranja);
        }

        .risk-btn.amarillo.active {
            background: var(--amarillo);
            border-color: var(--amarillo);
            color: var(--bg-dark);
        }

        .risk-btn.verde.active {
            background: var(--verde);
            border-color: var(--verde);
        }

        .colonies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .colony-card {
            background: var(--bg-dark);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            transition: all 0.3s;
            cursor: pointer;
        }

        .colony-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-color: var(--accent);
        }

        .colony-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
        }

        .colony-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .colony-municipality {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .risk-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .risk-badge.rojo {
            background: var(--rojo);
            color: white;
        }

        .risk-badge.naranja {
            background: var(--naranja);
            color: white;
        }

        .risk-badge.amarillo {
            background: var(--amarillo);
            color: var(--bg-dark);
        }

        .risk-badge.verde {
            background: var(--verde);
            color: white;
        }

        .colony-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            font-size: 0.85rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-weight: 600;
            font-size: 1rem;
        }

        .alerts-container {
            max-height: 400px;
            overflow-y: auto;
        }

        .alert-item {
            background: var(--bg-dark);
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: start;
            transition: all 0.3s;
        }

        .alert-item:hover {
            transform: translateX(4px);
        }

        .alert-item.critical {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.05);
        }

        .alert-item.warning {
            border-color: var(--warning);
            background: rgba(245, 158, 11, 0.05);
        }

        .alert-item.info {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        .alert-item.success {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.05);
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .alert-message {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .alert-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .btn-resolve {
            padding: 0.375rem 0.875rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-resolve:hover {
            background: #059669;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 1rem;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 1rem;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .detail-grid {
            display: grid;
            gap: 1rem;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem;
            background: var(--bg-dark);
            border-radius: 0.5rem;
        }

        .detail-label {
            color: var(--text-secondary);
        }

        .detail-value {
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

            .risk-filters {
                flex-wrap: wrap;
            }

            .colonies-grid {
                grid-template-columns: 1fr;
            }

            #map {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-container">
            <h1>🗳️ SIEME 2027</h1>
            <p>Sistema Inteligente de Monitoreo Electoral</p>
            
            <div class="login-error" id="loginError"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" value="admin" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" value="admin123" required>
                </div>
                
                <button type="submit" class="btn-login" id="btnLogin">
                    <span>Iniciar Sesión</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">🗳️ SIEME 2027</div>
                <div class="live-badge">
                    <div class="pulse-dot"></div>
                    EN VIVO
                </div>
            </div>
            
            <div class="header-right">
                <div class="countdown">
                    Elecciones en <strong id="daysToElection">0</strong> días
                </div>
                <div class="user-info">
                    <span class="user-name" id="userName">Admin</span>
                    <button class="btn-logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Salir
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Container -->
        <div class="container">
            <!-- KPI Cards -->
            <div class="kpi-grid" id="kpiGrid">
                <!-- Se llenan dinámicamente -->
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="showTab('dashboard')">
                    <i class="fas fa-chart-line"></i> Dashboard
                </button>
                <button class="tab" onclick="showTab('map')">
                    <i class="fas fa-map-marked-alt"></i> Mapa
                </button>
                <button class="tab" onclick="showTab('colonies')">
                    <i class="fas fa-th-large"></i> Colonias
                </button>
                <button class="tab" onclick="showTab('alerts')">
                    <i class="fas fa-exclamation-triangle"></i> Alertas
                </button>
            </div>

            <!-- Dashboard Tab -->
            <div id="tabDashboard" class="tab-content">
                <div class="section">
                    <h2 class="section-title">
                        <i class="fas fa-chart-bar"></i>
                        Intención de Voto por Municipio
                    </h2>
                    <div class="chart-container">
                        <canvas id="chartVoteByMunicipality"></canvas>
                    </div>
                </div>

                <div class="section">
                    <h2 class="section-title">
                        <i class="fas fa-chart-pie"></i>
                        Distribución de Colonias por Riesgo
                    </h2>
                    <div class="chart-container">
                        <canvas id="chartRiskDistribution"></canvas>
                    </div>
                </div>
            </div>

            <!-- Map Tab -->
            <div id="tabMap" class="tab-content" style="display: none;">
                <div class="section">
                    <h2 class="section-title">
                        <i class="fas fa-map"></i>
                        Mapa Electoral del AMG - 72 Colonias
                    </h2>
                    <div id="map"></div>
                </div>
            </div>

            <!-- Colonies Tab -->
            <div id="tabColonies" class="tab-content" style="display: none;">
                <div class="section">
                    <h2 class="section-title">
                        <i class="fas fa-search"></i>
                        Búsqueda y Filtros
                    </h2>
                    
                    <div class="filters">
                        <div class="filter-group">
                            <label>Buscar colonia</label>
                            <input type="text" id="searchColony" placeholder="Nombre de colonia...">
                        </div>
                        
                        <div class="filter-group">
                            <label>Municipio</label>
                            <select id="filterMunicipality">
                                <option value="">Todos</option>
                            </select>
                        </div>
                    </div>

                    <div class="filters">
                        <div class="filter-group">
                            <label>Filtrar por nivel de riesgo</label>
                            <div class="risk-filters">
                                <button class="risk-btn rojo" data-risk="rojo">Rojo</button>
                                <button class="risk-btn naranja" data-risk="naranja">Naranja</button>
                                <button class="risk-btn amarillo" data-risk="amarillo">Amarillo</button>
                                <button class="risk-btn verde" data-risk="verde">Verde</button>
                                <button class="risk-btn" data-risk="">Todos</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <h2 class="section-title">
                        <i class="fas fa-list"></i>
                        Colonias (<span id="coloniesCount">0</span>)
                    </h2>
                    <div class="colonies-grid" id="coloniesGrid">
                        <!-- Se llenan dinámicamente -->
                    </div>
                </div>
            </div>

            <!-- Alerts Tab -->
            <div id="tabAlerts" class="tab-content" style="display: none;">
                <div class="section">
                    <h2 class="section-title">
                        <i class="fas fa-bell"></i>
                        Alertas Activas (<span id="alertsCount">0</span>)
                    </h2>
                    <div class="alerts-container" id="alertsContainer">
                        <!-- Se llenan dinámicamente -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Colony Detail Modal -->
    <div class="modal" id="colonyModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 class="modal-title" id="modalTitle">Detalle de Colonia</h2>
            <div class="detail-grid" id="modalDetails">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ============= GLOBAL STATE =============
        let authToken = null;
        let userData = null;
        let map = null;
        let markers = [];
        let allColonies = [];
        let currentFilters = {
            search: '',
            municipality: '',
            risk: ''
        };

        // ============= API CONFIGURATION =============
        const API_BASE = '/api';

        // Helper para hacer fetch con auth
        async function fetchAPI(endpoint, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };

            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }

            const response = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers
            });

            if (response.status === 401) {
                logout();
                throw new Error('No autorizado');
            }

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'Error en la petición');
            }

            return response.json();
        }

        // ============= AUTHENTICATION =============
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');
            const errorDiv = document.getElementById('loginError');

            try {
                btnLogin.disabled = true;
                btnLogin.innerHTML = '<span>Iniciando...</span>';
                errorDiv.classList.remove('show');

                const data = await fetchAPI('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });

                authToken = data.token;
                userData = data.user;
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('userData', JSON.stringify(userData));

                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').classList.add('show');

                await initializeApp();

            } catch (error) {
                errorDiv.textContent = error.message || 'Error al iniciar sesión';
                errorDiv.classList.add('show');
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<span>Iniciar Sesión</span>';
            }
        });

        function logout() {
            authToken = null;
            userData = null;
            localStorage.removeItem('authToken');
            localStorage.removeItem('userData');
            location.reload();
        }

        async function checkSession() {
            const savedToken = localStorage.getItem('authToken');
            const savedUser = localStorage.getItem('userData');

            if (savedToken && savedUser) {
                try {
                    await fetchAPI('/auth/verify', {
                        headers: { 'Authorization': `Bearer ${savedToken}` }
                    });

                    authToken = savedToken;
                    userData = JSON.parse(savedUser);

                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('app').classList.add('show');
                    await initializeApp();
                } catch {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('userData');
                }
            }
        }

        // ============= APP INITIALIZATION =============
        async function initializeApp() {
            try {
                document.getElementById('userName').textContent = userData.username;

                const electionDate = new Date('2027-06-06');
                const today = new Date();
                const daysToElection = Math.ceil((electionDate - today) / (1000 * 60 * 60 * 24));
                document.getElementById('daysToElection').textContent = daysToElection;

                await loadDashboardStats();
                await loadMunicipalities();
                await loadColonies();
                await loadAlerts();

                setTimeout(initMap, 1000);

                setInterval(async () => {
                    await loadDashboardStats();
                    await loadAlerts();
                }, 30000);

            } catch (error) {
                console.error('Error initializing app:', error);
                alert('Error al cargar la aplicación');
            }
        }

        // ============= COLONIES =============
        async function loadColonies() {
            try {
                const params = new URLSearchParams();
                if (currentFilters.search) params.append('search', currentFilters.search);
                if (currentFilters.municipality) params.append('municipality_id', currentFilters.municipality);
                if (currentFilters.risk) params.append('risk_level', currentFilters.risk);
                params.append('limit', '1000');

                const data = await fetchAPI(`/colonies?${params.toString()}`);
                allColonies = data.data;

                renderColonies(allColonies);

            } catch (error) {
                console.error('Error loading colonies:', error);
            }
        }

        function renderColonies(colonies) {
            const grid = document.getElementById('coloniesGrid');
            const count = document.getElementById('coloniesCount');
            
            count.textContent = colonies.length;

            if (colonies.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">No se encontraron colonias</p>';
                return;
            }

            grid.innerHTML = colonies.map(colony => `
                <div class="colony-card" onclick="showColonyDetail(${colony.id})">
                    <div class="colony-header">
                        <div>
                            <div class="colony-name">${colony.name}</div>
                            <div class="colony-municipality">${colony.municipality_name}</div>
                        </div>
                        <div class="risk-badge ${colony.risk_level || 'amarillo'}">${colony.risk_level || 'N/A'}</div>
                    </div>
                    <div class="colony-stats">

                            <span class="stat-value" style="color: #3b82f6;">${colony.mc_percentage || 0}%</span>
                        </div>
                        <div class="stat-item">

                            <span class="stat-value" style="color: #dc2626;">${colony.morena_percentage || 0}%</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Bienestar</span>

            document.getElementById('colonyModal').classList.remove('show');
        }

        // Filtros de colonias
        document.getElementById('searchColony').addEventListener('input', (e) => {
            currentFilters.search = e.target.value;
            debounce(() => loadColonies(), 500)();
        });

        document.getElementById('filterMunicipality').addEventListener('change', (e) => {
            currentFilters.municipality = e.target.value;
            loadColonies();
        });

        document.querySelectorAll('.risk-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilters.risk = btn.dataset.risk;
                loadColonies();
            });
        });

        // ============= ALERTS =============
        async function loadAlerts() {
            try {
                const data = await fetchAPI('/alerts?status=active');
                const alerts = data.data;

                document.getElementById('alertsCount').textContent = alerts.length;
                
                const container = document.getElementById('alertsContainer');
                
                if (alerts.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">No hay alertas activas</p>';
                    return;
                }

                container.innerHTML = alerts.map(alert => `
                    <div class="alert-item ${alert.type}">
                        <div class="alert-content">
                            <div class="alert-title">${alert.title}</div>
                            <div class="alert-message">${alert.message}</div>
                            <div class="alert-time">
                                <i class="fas fa-clock"></i> 
                                ${new Date(alert.created_at).toLocaleString('es-ES')}
                            </div>
                        </div>
                        <button class="btn-resolve" onclick="resolveAlert(${alert.id})">
                            <i class="fas fa-check"></i> Resolver
                        </button>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading alerts:', error);
            }
        }

        async function resolveAlert(alertId) {
            try {
                await fetchAPI(`/alerts/${alertId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: 'resolved' })
                });
                await loadAlerts();
                await loadDashboardStats();
            } catch (error) {
                console.error('Error resolving alert:', error);
                alert('Error al resolver alerta');
            }
        }

        // ============= TABS =============
        function showTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.tab').classList.add('active');

            // Update content
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(`tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).style.display = 'block';

            // Lazy load map
            if (tabName === 'map' && !map) {
                initMap();
            }
        }

        // ============= UTILITIES =============
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('colonyModal').addEventListener('click', (e) => {
            if (e.target.id === 'colonyModal') {
                closeModal();
            }
        });

        // ============= INIT =============
        checkSession();
    </script>
